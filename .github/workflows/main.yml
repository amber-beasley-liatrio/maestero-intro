name: Maestro iOS Tests - Main

on:
  workflow_dispatch:

jobs:
  test-ios:
    name: Run Maestro Tests on iOS
    uses: ./.github/workflows/maestro-test-ios-reusable.yml
    with:
      simulator-device: "iPhone 16"
      timeout-minutes: 30
      test-path: ".maestro/"
      artifact-name-prefix: "maestro-test-results-main"
