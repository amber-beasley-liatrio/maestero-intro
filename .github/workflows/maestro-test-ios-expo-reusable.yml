name: Reusable Maestro Expo iOS Test Workflow

on:
  workflow_call:
    inputs:
      working-directory:
        description: 'Working directory for monorepo support'
        required: false
        type: string
        default: '.'
      simulator-device:
        description: 'iOS simulator device to use for testing'
        required: false
        type: string
        default: 'iPhone 16'
      timeout-minutes:
        description: 'Job timeout duration in minutes'
        required: false
        type: number
        default: 40
      test-path:
        description: 'Path to Maestro test files'
        required: false
        type: string
        default: '.maestro/'
      artifact-name-prefix:
        description: 'Prefix for test result artifact name'
        required: false
        type: string
        default: 'maestro-expo-test-results'
      bundle-id:
        description: 'iOS bundle identifier for the app'
        required: true
        type: string

jobs:
  test-expo-ios:
    name: Run Maestro Tests on Expo iOS
    runs-on: macos-15
    timeout-minutes: ${{ inputs.timeout-minutes }}
    env:
      APP_BUNDLE_ID: ${{ inputs.bundle-id }}
      MAESTRO_CLI_NO_ANALYTICS: 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: ${{ inputs.working-directory }}/pnpm-lock.yaml
      
      - name: Setup Java 17 (Maestro prerequisite)
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Cache Expo prebuild outputs
        uses: actions/cache/restore@v5
        id: prebuild-cache
        with:
          path: |
            ${{ inputs.working-directory }}/ios
            !${{ inputs.working-directory }}/ios/Pods
            ${{ inputs.working-directory }}/android
          key: ${{ runner.os }}-expo-prebuild-v3-${{ hashFiles(format('{0}/app.json', inputs.working-directory), format('{0}/package.json', inputs.working-directory)) }}
          restore-keys: |
            ${{ runner.os }}-expo-prebuild-v3-
      
      - name: Create .env file
        working-directory: ${{ inputs.working-directory }}
        run: |
          echo "EXPO_PUBLIC_BUNDLE_ID_DEBUG=$APP_BUNDLE_ID" > .env
          echo "✅ Environment file created with bundle ID"
      
      - name: Install pnpm dependencies
        working-directory: ${{ inputs.working-directory }}
        run: pnpm install --frozen-lockfile
      
      - name: Generate native iOS project (Expo prebuild)
        if: steps.prebuild-cache.outputs.cache-hit != 'true'
        working-directory: ${{ inputs.working-directory }}
        run: pnpm exec expo prebuild --platform ios
      
      - name: Cache CocoaPods dependencies
        uses: actions/cache/restore@v5
        id: pods-cache
        with:
          path: ${{ inputs.working-directory }}/ios/Pods
          key: ${{ runner.os }}-pods-v3-${{ hashFiles(format('{0}/ios/Podfile.lock', inputs.working-directory)) }}
          restore-keys: |
            ${{ runner.os }}-pods-v3-
      
      - name: Install CocoaPods dependencies
        if: steps.prebuild-cache.outputs.cache-hit == 'true' && steps.pods-cache.outputs.cache-hit != 'true'
        working-directory: ${{ inputs.working-directory }}/ios
        run: pod install --repo-update
      
      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
      
      - name: Get simulator UDID
        id: sim-udid
        run: |
          UDID=$(xcrun simctl list devices available | grep "${{ inputs.simulator-device }}" | head -n 1 | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          echo "Found ${{ inputs.simulator-device }} UDID: $UDID"
      
      - name: Build and install iOS app to simulator (Release)
        working-directory: ${{ inputs.working-directory }}
        run: |
          pnpm exec expo run:ios --device "$SIMULATOR_UDID" --configuration Release --no-bundler
      
      - name: Run Maestro tests with bundle ID
        id: maestro-tests
        working-directory: ${{ inputs.working-directory }}
        continue-on-error: true
        run: |
          export PATH="$HOME/.maestro/bin:$PATH"
          maestro test -e APP_BUNDLE_ID="$APP_BUNDLE_ID" ${{ inputs.test-path }} --format junit --output junit-report.xml
      
      - name: Upload Maestro test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name-prefix }}-${{ github.run_id }}
          path: ${{ inputs.working-directory }}/junit-report.xml
          retention-days: 14
          if-no-files-found: warn
      
      - name: Generate test summary
        if: always()
        working-directory: ${{ inputs.working-directory }}
        run: |
          echo "## 📱 Maestro Expo iOS Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "junit-report.xml" ]; then
            tests=$(sed -n 's/.*tests="\([0-9]*\)".*/\1/p' junit-report.xml | head -1)
            failures=$(sed -n 's/.*failures="\([0-9]*\)".*/\1/p' junit-report.xml | head -1)
            passed=$((tests - failures))
            echo "- **Total Tests:** $tests" >> $GITHUB_STEP_SUMMARY
            echo "- **Passed:** ✅ $passed" >> $GITHUB_STEP_SUMMARY
            if [ "$failures" -gt 0 ]; then
              echo "- **Failed:** ❌ $failures" >> $GITHUB_STEP_SUMMARY
            fi
            echo "- **Device:** ${{ inputs.simulator-device }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Bundle ID:** ${{ inputs.bundle-id }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No test results found" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Check test outcome and fail if tests failed
        if: always()
        run: |
          if [ "${{ steps.maestro-tests.outcome }}" = "failure" ]; then
            echo "::error::Maestro tests failed. See Test Results Summary above."
            exit 1
          fi

      - name: Save Expo prebuild cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            ${{ inputs.working-directory }}/ios
            !${{ inputs.working-directory }}/ios/Pods
            ${{ inputs.working-directory }}/android
          key: ${{ steps.prebuild-cache.outputs.cache-primary-key }}

      - name: Save CocoaPods cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ${{ inputs.working-directory }}/ios/Pods
          key: ${{ steps.pods-cache.outputs.cache-primary-key }}
